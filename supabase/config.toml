# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "open-bsp-api"

[api]
schemas = ["public", "storage", "billing"]

[functions.whatsapp-webhook]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/whatsapp-webhook/index.ts"

[functions.instagram-webhook]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/instagram-webhook/index.ts"

[functions.whatsapp-management]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/whatsapp-management/index.ts"

[functions.media-preprocessor]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/media-preprocessor/index.ts"

[functions.agent-client]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/agent-client/index.ts"

[functions.whatsapp-dispatcher]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/whatsapp-dispatcher/index.ts"

[functions.mcp]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/mcp/index.ts"

[functions.send-invitation-email]
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/send-invitation-email/index.ts"

[auth]
# Base URL of the SPA; used as allow-list for OAuth `redirectTo` after Google returns to Supabase.
site_url = "https://acrm-app.tika-ai.com"
additional_redirect_urls = [
  "https://acrm-app.tika-ai.com",
  "https://acrm-app.tika-ai.com/**",
]

[auth.external.google]
enabled = true
client_id = "146242832612-9l2ctjc28es5i8fll3qqfrqp0h0ukfn9.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
# Must match an "Authorized redirect URI" in Google Cloud (OAuth client). Tells Google where to send the user after consent.
redirect_uri = "https://ndxlahgkhrabfnugrxtp.supabase.co/auth/v1/callback"
# Local Google sign-in often fails nonce validation unless skipped.
skip_nonce_check = true
